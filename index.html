  var u=s.toUpperCase();
  if(u.indexOf("CONFIRMED")>=0)return"Confirmed";
  if(u.indexOf("NEEDS")>=0)return"Needs dev";
  if(u.indexOf("CANDIDATE")>=0)return"Candidate";
  if(u.indexOf("MISSING")>=0)return"Missing";
  return s;
}

function tClass(t){
  var m={MONITOR:"tm",DETECT:"td",INVESTIGATE:"ti",RECOMMEND:"tr",EXECUTE:"te"};
  return m[t]||"tm";
}

function rSB(){
  var el=document.getElementById("sb");
  el.innerHTML="";
  for(var i=0;i<O.length;i++){
    var w=O[i],d=D[w];
    if(!d)continue;
    var b=bgc(d),btn=document.createElement("button");
    btn.className="wbtn"+(w===aw?" active":"");
    btn.dataset.idx=i;
    btn.innerHTML="<div style='flex:1;min-width:0'><div class='wn'>"+esc(w)+"</div><div class='wm'>"+d.uc_count+" UCs &middot; "+(d.curr_ev+d.todo_ev)+" events</div></div><span class='wb "+b.c+"'>"+(b.t)+"</span>";
    btn.addEventListener("click",function(){sel(parseInt(this.dataset.idx));});
    el.appendChild(btn);
  }
}

function rD(w){
  var d=D[w],total=d.curr_ev+d.todo_ev,pct=total?Math.round(d.curr_ev/total*100):0;
  var tf=(at==="features"),tu=(at==="ucs");
  var el=document.getElementById("det");
  el.innerHTML="";

  var title=document.createElement("div"); title.className="dt"; title.textContent=w; el.appendChild(title);

  var stats=document.createElement("div"); stats.className="ds";
  stats.innerHTML="<span class='st'>"+d.uc_count+" use cases</span>"    +"<span class='st sb2'>"+d.curr_ev+" events live</span>"    +(d.todo_ev?"<span class='st sr'>"+d.todo_ev+" to build</span>":"")    +(total?"<span class='st'>"+pct+"% coverage</span>":"");
  el.appendChild(stats);

  var tabs=document.createElement("div"); tabs.className="tabs";
  var tf1=document.createElement("button"); tf1.className="tab"+(tf?" active":""); tf1.textContent="Features & events"; tf1.dataset.tab="features";
  var tf2=document.createElement("button"); tf2.className="tab"+(tu?" active":""); tf2.textContent="Use cases ("+d.uc_count+")"; tf2.dataset.tab="ucs";
  tf1.addEventListener("click",function(){switchTab(this.dataset.tab);});
  tf2.addEventListener("click",function(){switchTab(this.dataset.tab);});
  tabs.appendChild(tf1); tabs.appendChild(tf2); el.appendChild(tabs);

  var pf=document.createElement("div"); pf.className="pnl"+(tf?" active":""); pf.innerHTML=buildFeatures(d); el.appendChild(pf);
  var pu=document.createElement("div"); pu.className="pnl"+(tu?" active":""); pu.innerHTML=buildUCs(d); el.appendChild(pu);

  el.querySelectorAll(".fr").forEach(function(row){
    row.addEventListener("click",function(){togFeat(this.dataset.key);});
  });
}

function buildFeatures(d){
  var fk=Object.keys(d.features);
  if(!fk.length)return"<div class='nft'>No features mapped yet.</div>";
  var h="<div class='leg'><div class='li'><div class='ld' style='background:#16a34a'></div>Live</div><div class='li'><div class='ld' style='background:#dc2626'></div>To build</div></div>";
  for(var i=0;i<fk.length;i++){
    var fn=fk[i],fv=d.features[fn],key=aw+"||"+fn,open=of[key];
    var c=fv.curr.length,t=fv.todo.length,ev="";
    for(var j=0;j<fv.curr.length;j++)ev+="<div class='ei'><div class='ed ec'></div><div class='en'>"+esc(fv.curr[j])+"</div></div>";
    for(var k=0;k<fv.todo.length;k++)ev+="<div class='ei'><div class='ed et'></div><div class='en'>"+esc(fv.todo[k])+"</div></div>";
    h+="<div class='fr"+(open?" open":"")+" ' data-key="+JSON.stringify(key)+">"      +"<div class='fn'><span>"+esc(fn)+"</span>"        +"<div class='fr-r'>"          +(c?"<span style='font-size:11px;font-weight:600;color:#16a34a'>"+c+" live</span>":"")          +(t?"<span style='font-size:11px;font-weight:600;color:#dc2626'>"+t+" to build</span>":"")          +"<span class='fc'>&#9654;</span>"        +"</div>"      +"</div>"      +"<div class='fe'>"+(ev||"<div class='nf'>No events yet</div>")+"</div>"    +"</div>";
  }
  return h;
}

function buildUCs(d){
  var types=["MONITOR","DETECT","INVESTIGATE","RECOMMEND","EXECUTE"],by={};
  for(var i=0;i<types.length;i++)by[types[i]]=[];
  for(var i=0;i<d.ucs.length;i++){var u=d.ucs[i],t=u.type.toUpperCase();if(by[t])by[t].push(u);else by["MONITOR"].push(u);}
  var h="";
  for(var i=0;i<types.length;i++){
    var type=types[i];if(!by[type].length)continue;
    h+="<div class='sl'>"+type+"</div>";
    for(var j=0;j<by[type].length;j++){
      var u=by[type][j],pri=u.priority?"<span class='pb'>P"+String(u.priority).padStart(2,"0")+"</span>":"";
      h+="<div class='uc'>"        +"<div class='uh'><span class='ui'>"+esc(u.id)+"</span><span class='ud'>"+esc(u.desc)+"</span></div>"        +"<div class='up'>"          +"<span class='tp "+tClass(u.type)+"'>"+u.type+"</span>"          +"<span class='tp "+sClass(u.status)+"'>"+sLabel(u.status)+"</span>"          +pri        +"</div>"      +"</div>";
    }
  }
  return h;
}

function sel(i){aw=O[i];of={};rSB();rD(aw);}
function switchTab(t){at=t;rD(aw);}
function togFeat(k){of[k]=!of[k];rD(aw);}

rSB();
</script>
</body>
</html>
