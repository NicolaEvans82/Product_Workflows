function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function badge(d){
  var t=d.curr_ev+d.todo_ev;
  if(!t)return {cls:"bg-gray",txt:"No events"};
  var p=Math.round(d.curr_ev/t*100);
  if(p>=80)return {cls:"bg-green",txt:p+"% live"};
  if(p>=30)return {cls:"bg-amber",txt:p+"% live"};
  if(p>0)return {cls:"bg-red",txt:p+"% live"};
  return {cls:"bg-gray",txt:"0% live"};
}

function sClass(s){
  if(!s)return "sp-oos";
  var u=s.toUpperCase();
  if(u.indexOf("CONFIRMED")>=0)return "sp-confirmed";
  if(u.indexOf("NEEDS")>=0)return "sp-needs";
  if(u.indexOf("CANDIDATE")>=0)return "sp-candidate";
  if(u.indexOf("MISSING")>=0)return "sp-missing";
  return "sp-oos";
}
function sLabel(s){
  if(!s)return "--";
  var u=s.toUpperCase();
  if(u.indexOf("CONFIRMED")>=0)return "Confirmed";
  if(u.indexOf("NEEDS")>=0)return "Needs dev";
  if(u.indexOf("CANDIDATE")>=0)return "Candidate";
  if(u.indexOf("MISSING")>=0)return "Missing";
  return s;
}

        +'<div class="wf-meta">'+d.uc_count+' UCs &middot; '+(d.curr_ev+d.todo_ev)+' events</div>'
      +'</div>'
      +'<span class="wf-badge '+b.cls+'">'+b.txt+'</span>'
    +'</button>';
  }
  document.getElementById("sidebar").innerHTML=h;
}

function renderDetail(wf){
  var d=DATA[wf], total=d.curr_ev+d.todo_ev, pct=total?Math.round(d.curr_ev/total*100):0;
  var tabF=(activeTab==="features"), tabU=(activeTab==="ucs");
  var h='<div class="detail-title">'+esc(wf)+'</div>'
    +'<div class="detail-stats">'
      +'<span class="stat">'+d.uc_count+' use cases</span>'
      +'<span class="stat stat-green">'+d.confirmed+' confirmed</span>'
      +'<span class="stat stat-blue">'+d.curr_ev+' events live</span>'
      +(d.todo_ev ? '<span class="stat stat-red">'+d.todo_ev+' to build</span>' : "")
      +(total ? '<span class="stat">'+pct+'% coverage</span>' : "")
    +'</div>'
    +'<div class="tabs">'
      +'<button class="tab'+(tabF?" active":"")+'" onclick="switchTab(\"features\")">Features &amp; events</button>'
      +'<button class="tab'+(tabU?" active":"")+'" onclick="switchTab(\"ucs\")">Use cases ('+d.uc_count+')</button>'
    +'</div>'
    +'<div class="panel'+(tabF?" active":"")+'">'+buildFeatures(d)+'</div>'
    +'<div class="panel'+(tabU?" active":"")+'">'+buildUCs(d)+'</div>';
  document.getElementById("detail").innerHTML=h;
}

function buildFeatures(d){
  var feats=Object.keys(d.features);
  if(!feats.length) return '<div class="no-feats">No features mapped yet.</div>';
  var h='<div class="legend">'
    +'<div class="leg"><div class="leg-dot" style="background:#16a34a"></div>Live</div>'
    +'<div class="leg"><div class="leg-dot" style="background:#dc2626"></div>To build</div>'
  +'</div>';
  for(var i=0;i<feats.length;i++){
    var fn=feats[i], fv=d.features[fn];
    var key=activeWf+"||"+fn;
    var open=openFeats[key];
    var c=fv.curr.length, t=fv.todo.length;
    var evs="";
    for(var j=0;j<fv.curr.length;j++) evs+='<div class="ev-item"><div class="ev-dot curr"></div><div class="ev-name">'+esc(fv.curr[j])+'</div></div>';
    for(var k=0;k<fv.todo.length;k++) evs+='<div class="ev-item"><div class="ev-dot todo"></div><div class="ev-name">'+esc(fv.todo[k])+'</div></div>';
    h+='<div class="feat-row'+(open?" open":"")+'" onclick="togFeat('+JSON.stringify(key)+')">'
      +'<div class="feat-name"><span>'+esc(fn)+'</span>'
        +'<div class="feat-right">'
          +(c ? '<span style="font-size:11px;font-weight:600;color:#16a34a">'+c+' live</span>' : "")
          +(t ? '<span style="font-size:11px;font-weight:600;color:#dc2626">'+t+' to build</span>' : "")
          +'<span class="feat-chev">&#9654;</span>'
        +'</div>'
      +'</div>'
      +'<div class="feat-evs">'+(evs||'<div class="no-evs">No events yet</div>')+'</div>'
    +'</div>';
  }
  return h;
}

function buildUCs(d){
  var types=["MONITOR","DETECT","INVESTIGATE","RECOMMEND","EXECUTE"];
  var by={};
  for(var i=0;i<types.length;i++) by[types[i]]=[];
  for(var i=0;i<d.ucs.length;i++){
    var u=d.ucs[i], t=u.type.toUpperCase();
    if(by[t]) by[t].push(u); else by["MONITOR"].push(u);
  }
  var h="";
  for(var i=0;i<types.length;i++){
    var type=types[i];
    if(!by[type].length) continue;
    h+='<div class="sec-lbl">'+type+'</div>';
    for(var j=0;j<by[type].length;j++){
      var u=by[type][j];
      var pri=u.priority ? '<span class="pri-badge">P'+String(u.priority).padStart(2,"0")+"</span>" : "";
      h+='<div class="uc-item">'
        +'<div class="uc-hdr"><span class="uc-id">'+esc(u.id)+'</span><span class="uc-desc">'+esc(u.desc)+'</span></div>'
        +'<div class="uc-pills">'
          +'<span class="tp tp-'+u.type+'">'+u.type+'</span>'
          +'<span class="tp '+sClass(u.status)+'">'+sLabel(u.status)+'</span>'
          +pri
        +'</div>'
      +'</div>';
    }
  }
  return h;
}

function sel(i){ activeWf=WF_ORDER[i]; openFeats={}; renderSidebar(); renderDetail(activeWf); }
function switchTab(t){ activeTab=t; renderDetail(activeWf); }
function togFeat(k){ openFeats[k]=!openFeats[k]; renderDetail(activeWf); }

renderSidebar();

</script>
</body>
</html>
